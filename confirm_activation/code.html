<script>
        // Micro-interactions for checklist cards
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const parent = this.closest('label');
                if (this.checked) {
                    parent.classList.add('border-commerce-cobalt', 'bg-surface-container-low');
                    parent.classList.remove('bg-white');
                } else {
                    parent.classList.remove('border-commerce-cobalt', 'bg-surface-container-low');
                    parent.classList.add('bg-white');
                }
            });
        });

        // Close action simulation
        document.querySelector('button .material-symbols-outlined').parentElement.addEventListener('click', () => {
            document.querySelector('main').style.opacity = '0';
            document.querySelector('main').style.transform = 'scale(0.95)';
            document.querySelector('main').style.transition = 'all 0.4s ease-in-out';
            setTimeout(() => {
                alert('Closing State. In a real app, this would route back.');
            }, 400);
        });
    </script>
