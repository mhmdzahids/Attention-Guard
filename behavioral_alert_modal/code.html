<img alt="MindState Dashboard Background" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxyvhGbaJUx80s_3mIMUKMrkZdU7Fa0hL-YJUq5ScIxyequj-Hh9TJSvK_vkCtMzTjJsaQCnbp_jzouxrnO8Q7rP4MRtlcjxnTmA4u3yHUHgA86b8myCRR6i3KFLGKEMV7Smm53Tdro43bfHELCKZ1V4d0cXNWmy1cM4tk2KseAJgZt0gM86zccl1MXo67uHI9v6qLMs7SA7aOq8lJXAXuZPpUwwj3qtku2YZJop8Hd6ajyU2yoEIbJQ">
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center px-base bg-black/40 backdrop-blur-sm transition-opacity duration-300" id="modal-overlay">
<!-- Behavioral Alert Card -->
<div class="relative bg-surface-container-lowest w-full max-w-[340px] rounded-xxl border border-hairline-soft shadow-xl overflow-hidden transform transition-all duration-500 scale-100 opacity-100 p-xl flex flex-col items-center text-center">
<!-- Top-aligned Pill Badge -->
<div class="mb-lg">
<span class="bg-warning-yellow text-on-tertiary px-base py-xxs rounded-full font-button-md text-caption uppercase tracking-wider">
                    Attention Nudge
                </span>
</div>
<!-- Icon -->
<div class="mb-base text-commerce-cobalt">
<span class="material-symbols-outlined" data-icon="self_improvement">self_improvement</span>
</div>
<!-- Header -->
<h2 class="font-heading-sm text-heading-sm font-bold text-on-surface mb-xs leading-tight">
                Late-Night Scrolling Detected
            </h2>
<!-- Body Text -->
<p class="font-body-sm text-body-sm text-steel-gray mb-xxl px-xxs">
                You’ve spent 40% more time on short-form videos after midnight this week. Taking a short break can help restore your attention span tomorrow.
            </p>
<!-- Dual Pill Buttons (CTAs) -->
<div class="flex flex-col w-full gap-sm">
<!-- Primary Button -->
<button class="w-full h-[48px] bg-ink-button text-white rounded-full font-button-md text-button-md hover:opacity-90 active:scale-95 transition-all" id="close-modal">
                    Got It
                </button>
<!-- Secondary Ghost Button -->
<button class="w-full h-[48px] border-2 border-[#0A1317] text-[#0A1317] rounded-full font-button-md text-button-md hover:bg-surface-soft active:scale-95 transition-all">
                    Set Reminder
                </button>
</div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('modal-overlay');
            const closeBtn = document.getElementById('close-modal');

            // Simple dismissal logic for the demo
            closeBtn.addEventListener('click', () => {
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
            });

            // Prevent scroll on body while modal is open
            document.body.style.overflow = 'hidden';
        });
    </script>
